<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NaPlanta &middot; Gerador Instagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;900&family=DM+Serif+Display&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#E60000;--dark:#0A0A0A;--border:#E0E0E0}
body{font-family:'DM Sans',sans-serif;background:#EFEFED;color:#1a1a1a;min-height:100vh}
header{background:#0A0A0A;padding:.7rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #E60000;flex-wrap:wrap;gap:.5rem}
.header-logo img{height:40px;width:auto;display:block}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-btn{padding:6px 14px;background:transparent;border:1px solid #333;border-radius:3px;color:#888;font-size:.75rem;cursor:pointer;font-family:inherit}
.sync-btn:hover{border-color:#E60000;color:#E60000}
.sync-btn:disabled{opacity:.4;cursor:not-allowed}
.status-pill{font-size:.72rem;color:#555;padding:4px 10px;background:#1a1a1a;border-radius:20px;white-space:nowrap}
.status-pill.ok{color:#4caf50}.status-pill.erro{color:#E60000}
.container{max-width:1200px;margin:0 auto;padding:1.5rem}
.search-bar{background:#fff;border-radius:8px;padding:.9rem 1.25rem;border:1px solid var(--border);margin-bottom:1.5rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-top:3px solid #E60000;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.search-bar input,.filter-sel{padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:.85rem;outline:none;background:#F7F7F5}
.search-bar input{flex:1;min-width:160px}
.search-bar input:focus,.filter-sel:focus{border-color:#E60000}
.count-badge{font-size:.8rem;color:#888;white-space:nowrap;font-weight:600}
.imoveis-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.imovel-card{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:box-shadow .18s,transform .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.imovel-card:hover{box-shadow:0 6px 22px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:#111}
.card-img-ph{width:100%;height:160px;background:#111;display:flex;align-items:center;justify-content:center}
.card-body{padding:.9rem}
.card-id{font-size:.62rem;color:#C0BDB5;margin-bottom:3px;font-weight:600;letter-spacing:.04em}
.card-tipo{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E60000;margin-bottom:4px}
.card-title{font-size:.85rem;font-weight:600;line-height:1.35;margin-bottom:6px;color:#111}
.card-local{font-size:.75rem;color:#888;margin-bottom:8px}
.card-specs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.spec{font-size:.72rem;color:#666;background:#F7F7F5;padding:2px 8px;border-radius:10px;border:1px solid #eee}
.card-price{font-size:.98rem;font-weight:700;color:#0A0A0A;margin-bottom:10px}
.card-price.aluguel{color:#1a5fcc}
.gen-card-btn{width:100%;padding:10px;background:#0A0A0A;color:#fff;border:none;border-radius:5px;font-size:.78rem;font-weight:700;letter-spacing:.06em;cursor:pointer;border-bottom:2px solid #E60000;text-transform:uppercase;transition:all .15s;font-family:inherit}
.gen-card-btn:hover{background:#E60000;border-bottom-color:#900}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.62rem;font-weight:700;text-transform:uppercase;margin-left:5px}
.for-sale{background:#EDFAED;color:#1a7a1a}.for-rent{background:#EBF0FF;color:#1a3d9a}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:10px;width:100%;max-width:1060px;max-height:93vh;overflow-y:auto;border-top:4px solid #E60000;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.modal-inner{padding:1.75rem}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #eee}
.modal-id{font-size:.65rem;color:#C0BDB5;font-weight:600;letter-spacing:.05em;margin-bottom:3px}
.modal-title{font-size:.95rem;font-weight:700;max-width:86%;line-height:1.4}
.close-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#aaa}
.close-btn:hover{color:#E60000}
/* FOTO GALLERY */
.foto-section{margin-bottom:1.25rem;background:#F7F7F5;border-radius:8px;padding:1rem}
.foto-section-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.foto-section-title span{background:#E60000;color:#fff;font-size:.62rem;padding:2px 8px;border-radius:10px}
.fotos-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory}
.fotos-scroll::-webkit-scrollbar{height:4px}
.fotos-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.foto-option{position:relative;width:148px;height:110px;border-radius:6px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:all .18s;flex-shrink:0;background:#ddd;scroll-snap-align:start}
.foto-option img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.foto-option:hover img{transform:scale(1.05)}
.foto-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .18s;display:flex;align-items:center;justify-content:center}
.foto-check{width:34px;height:34px;border-radius:50%;background:#E60000;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.6);transition:all .2s;font-size:17px;color:#fff;font-weight:700}
.foto-option:hover .foto-overlay{background:rgba(0,0,0,.2)}
.foto-option:hover .foto-check{opacity:.8;transform:scale(1)}
.foto-option.selecionada{border-color:#E60000;box-shadow:0 0 0 3px rgba(230,0,0,.25)}
.foto-option.selecionada .foto-check{opacity:1;transform:scale(1)}
.foto-num{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.55);color:#fff;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:4px}
.foto-count{font-size:.72rem;color:#aaa;margin-top:.5rem}
/* MODAL GRID */
.modal-grid{display:grid;grid-template-columns:310px 1fr;gap:1.5rem}
@media(max-width:760px){.modal-grid{grid-template-columns:1fr}}
.side-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:.5rem}
.fmt-tabs{display:flex;gap:5px;margin-bottom:.9rem}
.fmt-btn{flex:1;padding:8px 6px;border:1px solid var(--border);border-radius:4px;background:#F7F7F5;font-size:.78rem;font-weight:600;cursor:pointer;color:#666;font-family:inherit}
.fmt-btn.active{background:#0A0A0A;color:#fff;border-color:#0A0A0A;border-bottom:2px solid #E60000}
.gen-big-btn{width:100%;padding:13px;background:#E60000;color:#fff;border:none;border-radius:5px;font-family:inherit;font-size:.9rem;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;margin-bottom:6px}
.gen-big-btn:hover{opacity:.88}
.gen-big-btn:disabled{opacity:.4;cursor:not-allowed}
.promo-price-box{margin-top:.75rem;background:#fff8f0;border:1.5px solid #E60000;border-radius:6px;padding:.6rem .75rem}
.promo-price-label{display:block;font-size:.68rem;font-weight:700;color:#E60000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.promo-price-label span{font-weight:400;color:#888;text-transform:none;letter-spacing:0}
.promo-price-input{width:100%;padding:.45rem .6rem;border:1px solid #ddd;border-radius:4px;font-size:.9rem;font-family:inherit;outline:none;background:#fff}
.promo-price-input:focus{border-color:#E60000}
.gen-video-btn{width:100%;padding:11px;background:#0A0A0A;color:#C9A96E;border:none;border-radius:5px;font-family:inherit;font-size:.85rem;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;border-bottom:2px solid #E60000}
.gen-video-btn:hover{opacity:.85}
.gen-video-btn:disabled{opacity:.4;cursor:not-allowed}
.info-box{background:#F7F7F5;border-radius:6px;padding:.9rem;font-size:.82rem;line-height:1.9;border-left:3px solid #E60000;margin-top:.9rem}
.info-box strong{color:#0A0A0A}
/* RESULTS */
.result-posts{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem}
.post-wrap{text-align:center}
.post-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:5px;font-weight:700}
.dl-btn{padding:8px 14px;border:1px solid var(--border);border-radius:4px;font-size:.72rem;font-weight:700;background:#F7F7F5;cursor:pointer;color:#555;margin-top:5px;display:block;width:100%;text-transform:uppercase;font-family:inherit}
.dl-btn:hover{background:#0A0A0A;color:#fff}
.caption-section{background:#0A0A0A;border-radius:6px;padding:1.1rem;margin-top:.9rem}
.caption-lbl{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#E60000;margin-bottom:.6rem}
.caption-body{font-size:.85rem;line-height:1.8;white-space:pre-wrap;color:#fff}
.hashtags{margin-top:.65rem;display:flex;flex-wrap:wrap;gap:4px}
.htag{background:#181818;color:#aaa;padding:3px 9px;border-radius:3px;font-size:.7rem;border:1px solid #2a2a2a}
.copy-btn{margin-top:.75rem;padding:9px 18px;background:#E60000;color:#fff;border:none;border-radius:4px;font-size:.78rem;font-weight:700;cursor:pointer;text-transform:uppercase;font-family:inherit;display:inline-block}
.wa-btn{display:block;margin-top:8px;padding:10px 18px;background:#25D366;color:#fff;border-radius:4px;font-size:.78rem;font-weight:700;text-align:center;text-decoration:none;font-family:inherit;letter-spacing:.05em;text-transform:uppercase}
.wa-btn:hover{opacity:.88}
.spinner-inline{width:17px;height:17px;border:2px solid #333;border-top-color:#E60000;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{text-align:center;padding:2rem;color:#888;font-size:.88rem}
.empty-state{text-align:center;padding:3rem;color:#bbb}
canvas{display:block;border-radius:4px}
video{display:block;border-radius:4px;max-width:100%}
.progress-bar{width:100%;height:4px;background:#222;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#E60000;border-radius:2px;transition:width .3s}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:#0A0A0A;z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  font-family:'DM Sans',sans-serif;
}
.login-box{
  width:100%;max-width:420px;padding:2.5rem 2rem;
  background:#141414;border-radius:12px;border:1px solid #222;
  border-top:4px solid #E60000;box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo img{height:44px;width:auto}
.login-quote{
  font-size:1rem;color:#888;text-align:center;font-style:italic;
  line-height:1.7;margin-bottom:2.5rem;min-height:4rem;
  padding:0 .5rem;transition:opacity .4s;
}
.login-field{margin-bottom:1rem}
.login-field label{display:block;font-size:.72rem;font-weight:600;
  color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.login-field input{
  width:100%;padding:11px 14px;background:#0A0A0A;border:1px solid #2a2a2a;
  border-radius:5px;color:#fff;font-family:inherit;font-size:.9rem;outline:none;
  transition:border .15s;
}
.login-field input:focus{border-color:#E60000}
.login-btn{
  width:100%;padding:13px;background:#E60000;color:#fff;border:none;
  border-radius:5px;font-family:inherit;font-size:.95rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;text-transform:uppercase;
  transition:opacity .15s;margin-top:.5rem;
}
.login-btn:hover{opacity:.88}
.login-error{
  font-size:.78rem;color:#E60000;text-align:center;
  margin-top:.75rem;min-height:1.2rem;
}
.login-version{
  position:absolute;bottom:1rem;font-size:.68rem;color:#333;
}

/* ── XML EXPORT BAR ── */
.export-bar{
  background:#0A0A0A;border-top:3px solid #E60000;
  padding:.9rem 2rem;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  position:sticky;bottom:0;z-index:100;
}
.export-bar-left{font-size:.78rem;color:#555}
.export-bar-left strong{color:#E60000}
.export-xml-btn{
  padding:9px 20px;background:#E60000;color:#fff;border:none;
  border-radius:4px;font-family:inherit;font-size:.82rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;transition:opacity .15s;
}
.export-xml-btn:hover{opacity:.88}
.export-xml-btn:disabled{opacity:.4;cursor:not-allowed}
.export-progress{
  font-size:.75rem;color:#666;margin-top:3px;
}


/* ── CADASTRO MODAL ── */
#cadastro-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;
  display:none;align-items:center;justify-content:center;padding:1rem;
}
.cadastro-box{
  width:100%;max-width:460px;background:#141414;border-radius:12px;
  border:1px solid #222;border-top:4px solid #E60000;
  box-shadow:0 24px 60px rgba(0,0,0,.6);padding:2rem;
  font-family:'DM Sans',sans-serif;
}
.cadastro-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.cadastro-header h3{font-size:1rem;font-weight:700;color:#fff;margin:0}
.cadastro-close{background:none;border:none;color:#555;font-size:1.4rem;cursor:pointer;line-height:1}
.cadastro-close:hover{color:#E60000}
.cad-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.cad-row.full{grid-template-columns:1fr;margin-bottom:1rem}
.cad-field label{display:block;font-size:.7rem;font-weight:600;color:#555;
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.cad-field input,.cad-field select{
  width:100%;padding:9px 12px;background:#0A0A0A;border:1px solid #2a2a2a;
  border-radius:4px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;transition:border .15s;
}
.cad-field input:focus,.cad-field select:focus{border-color:#E60000}
.cad-field select option{background:#141414}
.cad-btn{
  width:100%;padding:11px;background:#E60000;color:#fff;border:none;border-radius:4px;
  font-family:inherit;font-size:.88rem;font-weight:700;letter-spacing:.06em;
  cursor:pointer;text-transform:uppercase;margin-top:.5rem;transition:opacity .15s;
}
.cad-btn:hover{opacity:.88}
.cad-error{font-size:.75rem;color:#E60000;text-align:center;margin-top:.6rem;min-height:1rem}
.cad-success{font-size:.78rem;color:#4caf50;text-align:center;margin-top:.6rem}
.usuarios-lista{margin-top:1.25rem;max-height:180px;overflow-y:auto}
.usuarios-lista table{width:100%;border-collapse:collapse;font-size:.75rem}
.usuarios-lista th{color:#555;font-weight:600;text-align:left;padding:4px 8px;
  border-bottom:1px solid #222;text-transform:uppercase;font-size:.65rem;letter-spacing:.06em}
.usuarios-lista td{color:#aaa;padding:5px 8px;border-bottom:1px solid #1a1a1a}
.usuarios-lista td:last-child{text-align:center}
.del-usr{background:none;border:none;color:#555;cursor:pointer;font-size:.8rem}
.del-usr:hover{color:#E60000}

/* ── RODAPÉ DOWNLOAD XML ── */
.footer-main{
  background:#0A0A0A;border-top:1px solid #1a1a1a;
  padding:1rem 2rem;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.footer-links{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.footer-xml-btn{
  padding:8px 18px;background:transparent;color:#E60000;border:1px solid #E60000;
  border-radius:4px;font-family:inherit;font-size:.78rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.footer-xml-btn:hover{background:#E60000;color:#fff}
.footer-xml-btn:disabled{opacity:.4;cursor:not-allowed}
.footer-cad-btn{
  padding:8px 18px;background:transparent;color:#888;border:1px solid #333;
  border-radius:4px;font-family:inherit;font-size:.78rem;font-weight:600;
  letter-spacing:.05em;cursor:pointer;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.footer-cad-btn:hover{border-color:#888;color:#fff}
.footer-right{font-size:.7rem;color:#333;display:flex;align-items:center;gap:12px}
.footer-user{font-size:.72rem;color:#555}
.footer-logout{background:none;border:none;color:#333;font-size:.72rem;cursor:pointer;
  text-decoration:underline;font-family:inherit}
.footer-logout:hover{color:#E60000}
.xml-progress-bar{width:100%;background:#1a1a1a;border-radius:2px;height:3px;margin-top:4px;overflow:hidden;display:none}
.xml-progress-fill{height:100%;background:#E60000;border-radius:2px;transition:width .2s;width:0%}

</style>
</head>

function slugify(s){

// ── CARREGAR ──────────────────────────────────────────────────────────────────
var NP_CACHE_KEY='np_imoveis_cache';
var NP_CACHE_TTL=1800000; // 30 min em ms

function salvarCache(d){
  try{localStorage.setItem(NP_CACHE_KEY,JSON.stringify({ts:Date.now(),data:d}));}catch(e){}
}
function lerCache(){
  try{
    var raw=localStorage.getItem(NP_CACHE_KEY);
    if(!raw)return null;
    var obj=JSON.parse(raw);
    if(Date.now()-obj.ts>NP_CACHE_TTL)return null;
    return obj.data;
  }catch(e){return null;}
}

function carregarImoveis(forcar){
  var btn=document.getElementById('sync-btn');
  var cache=lerCache();

  // Se tem cache e n\u00e3o foi for\u00e7ado, mostra imediatamente e atualiza em background
  if(cache&&!forcar){
    todosImoveis=cache.imoveis;
    setStatus(cache.total+' imoveis \u00b7 '+cache.atualizado+' \u00b7 cache local','ok');
    filtrar();
    // Atualiza em background silenciosamente
    fetch(API_URL)
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(d){
        if(!d.imoveis||!d.imoveis.length)return;
        todosImoveis=d.imoveis;
        salvarCache(d);
        setStatus(d.total+' imoveis \u00b7 '+d.atualizado,'ok');
        filtrar();
      }).catch(function(){});
    return;
  }

  // Sem cache ou sincroniza\u00e7\u00e3o for\u00e7ada: mostra loading
  btn.disabled=true;btn.textContent='Carregando...';
  setStatus('Buscando...','');
  if(!cache)document.getElementById('grid').innerHTML='<div class="loading-msg" style="grid-column:1/-1"><span class="spinner-inline"></span>Buscando imoveis...</div>';
  fetch(API_URL)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      if(!d.imoveis||!d.imoveis.length)throw new Error('Sem imoveis');
      todosImoveis=d.imoveis;
      salvarCache(d);
      setStatus(d.total+' imoveis \u00b7 '+d.atualizado,'ok');
      filtrar();
    })
    .catch(function(e){setStatus('Erro: '+e.message,'erro');if(!todosImoveis.length)document.getElementById('grid').innerHTML='<div class="empty-state"><p style="font-size:1.5rem">&#9888;</p><p style="margin-top:.5rem">Verifique se o proxy.php esta instalado e a URL esta correta no index.html.</p></div>';})
    .finally(function(){btn.disabled=false;btn.textContent='\u21bb Sincronizar';});
}

// ── FILTRAR ───────────────────────────────────────────────────────────────────
function filtrar(){
  var busca=document.getElementById('busca').value.trim();
  var fT=document.getElementById('filtro-tipo').value;
  var fR=document.getElementById('filtro-trans').value;
  var ord=document.getElementById('filtro-ordem').value;
  var lista=todosImoveis.filter(function(im){
    if(busca){
      var idStr=String(im.id||'');
      var codMatch=(idStr===busca||idStr.indexOf(busca)===0);
      var txtMatch=((im.titulo||'')+(im.bairro||'')+(im.cidade||'')+(im.tipo||'')).toLowerCase().indexOf(busca.toLowerCase())>-1;
      if(!codMatch&&!txtMatch)return false;
    }
    if(fT&&(im.tipo||'').indexOf(fT)===-1)return false;
    if(fR&&(im.transac||'')!==fR)return false;
    return true;
  });
  if(ord==='menor')lista.sort(function(a,b){return(a.preco||a.aluguel||0)-(b.preco||b.aluguel||0);});
  else if(ord==='maior')lista.sort(function(a,b){return(b.preco||b.aluguel||0)-(a.preco||a.aluguel||0);});
  else lista.sort(function(a,b){return parseInt(b.id||0)-parseInt(a.id||0);});
  document.getElementById('count-badge').textContent=lista.length+' imoveis';
  renderGrid(lista);
}

// ── IMAGE LOADING ─────────────────────────────────────────────────────────────
function loadImg(url){
  if(!url)return Promise.resolve(null);
  if(fotoCache[url])return Promise.resolve(fotoCache[url]);
  var base=url.replace(/^https?:\/\//,'');var tries=['https://images.weserv.nl/?url='+encodeURIComponent(base)+'&output=jpg&maxage=7d','https://corsproxy.io/?'+encodeURIComponent(url),'https://images.weserv.nl/?url='+encodeURIComponent(base),url];
  return new Promise(function(res){
    var idx=0;
    function next(){
      if(idx>=tries.length){res(null);return;}
      var img=new Image();img.crossOrigin='anonymous';
      var done=false,to=setTimeout(function(){if(!done){done=true;idx++;next();}},7000);
      img.onload=function(){if(!done){done=true;clearTimeout(to);fotoCache[url]=img;res(img);}};
      img.onerror=function(){if(!done){done=true;clearTimeout(to);idx++;next();}};
      img.src=tries[idx];
    }
    next();
  });
}
function loadLogo(){
  if(logoCache)return Promise.resolve(logoCache);
  return new Promise(function(res){var img=new Image();img.onload=function(){logoCache=img;res(img);};img.onerror=function(){res(null);};img.src=LOGO_WHITE;});
}

// ── CANVAS HELPERS ────────────────────────────────────────────────────────────
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function wrap(ctx,text,x,y,mW,lh,max){
  max=max||2;var words=text.split(' '),line='',lines=[];
  for(var i=0;i<words.length;i++){var t=line?line+' '+words[i]:words[i];if(ctx.measureText(t).width>mW&&line){lines.push(line);line=words[i];}else line=t;if(lines.length>=max)break;}
  if(line&&lines.length<max)lines.push(line);
  for(var j=0;j<lines.length;j++)ctx.fillText(lines[j],x,y+j*lh);
}
function specsList(im){
  var s=[];
  if(im.quartos&&im.quartos!=='0')s.push(im.quartos+(im.quartos>'1'?' dorms':' dorm'));
  if(im.suites&&im.suites!=='0')s.push(im.suites+' su\u00edte'+(im.suites>'1'?'s':''));
  if(im.area&&im.area!=='0')s.push(im.area+'m\u00b2');
  if(im.vagas&&im.vagas!=='0')s.push(im.vagas+' vaga'+(im.vagas>'1'?'s':''));
  return s;
}

function drawPrecoBox(ctx,im,W,yCentro,fontSize){

  ctx.fillStyle='rgba(0,0,0,0.58)';rr(ctx,bx,by,bw,bh,6);ctx.fill();
  ctx.fillStyle='#E60000';ctx.fillRect(bx,by,5,bh);

}
function drawFeed(im,tipo,foto,logo,promoPreco){
  var W=1080,H=1080,c=document.createElement('canvas');
  c.width=W;c.height=H;c.style.width='280px';c.style.height='280px';
  var ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';

  var PHOTO_H=750,SPECS_H=168,FOOTER_H=H-750-168;
  var BG='#FAFAF8',BORDER='#E2DED5',DARK='#1A1A1A';
  var isR=im.transac==='For Rent';

  // Fundo geral
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

  // Foto (clipped)
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,PHOTO_H);ctx.clip();
  if(foto){var s=Math.max(W/foto.width,PHOTO_H/foto.height);ctx.drawImage(foto,(W-foto.width*s)/2,(PHOTO_H-foto.height*s)/2,foto.width*s,foto.height*s);}
  else{ctx.fillStyle='#C9BFB1';ctx.fillRect(0,0,W,PHOTO_H);}
  ctx.restore();

  // Gradiente na foto (baixo)
  var g=ctx.createLinearGradient(0,PHOTO_H-520,0,PHOTO_H);
  g.addColorStop(0,'rgba(10,8,6,0)');g.addColorStop(0.38,'rgba(10,8,6,0.55)');g.addColorStop(1,'rgba(10,8,6,0.90)');

  ctx.fillText('Cod. '+im.id,W-56,56);ctx.textAlign='left';

  // Preco sobreposto (baixo da foto)
  var precoOrig=isR?fmtR(im.aluguel):fmtR(im.preco);
  var precoVal=promoPreco?fmtR(promoPreco):precoOrig;

    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1;ctx.strokeRect(bx,overY-4,bw,bh);
    ctx.fillStyle='rgba(255,255,255,0.90)';ctx.fillText(tag,bx+10,overY+12);
    bx+=bw+8;
  });
  // Badge OFERTA ESPECIAL
  if(promoPreco){

  // Footer
  var fy=PHOTO_H+SPECS_H;

  ctx.font='300 22px DM Sans,sans-serif';ctx.fillStyle='#B0A89E';ctx.textAlign='left';ctx.textBaseline='top';
  wrap(ctx,descTxt,60,fy+18,W-120,34,3);
  return c;
}

  ctx.font='500 30px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,0.80)';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('Cod. '+im.id,W-60,60);ctx.textAlign='left';

  // Preco sobreposto (baixo da foto)
  var precoOrig=isR?fmtR(im.aluguel):fmtR(im.preco);
  var precoVal=promoPreco?fmtR(promoPreco):precoOrig;
  var ds=(im.descri||'').toLowerCase();

  var locTxt=((im.bairro||'')+' · '+(im.cidade||'')+' / SC').toUpperCase();
  var overY=PHOTO_H-(promoPreco?280:230);
  // localização + badges
  ctx.font='300 28px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,0.55)';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText(locTxt,60,overY+14);
  var sbx=60+ctx.measureText(locTxt).width+18;
  stags.forEach(function(tag){
    ctx.font='500 22px DM Sans,sans-serif';
    var bw=ctx.measureText(tag).width+22,bh=36;
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(sbx,overY-4,bw,bh);
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1;ctx.strokeRect(sbx,overY-4,bw,bh);
    ctx.fillStyle='rgba(255,255,255,0.90)';ctx.fillText(tag,sbx+11,overY+14);
    sbx+=bw+8;
  });
  // Badge OFERTA ESPECIAL
  if(promoPreco){
    ctx.font='700 32px DM Sans,sans-serif';
    var ofW=ctx.measureText('🔥 OFERTA ESPECIAL').width+36,ofH=60;
    ctx.fillStyle='#E60000';ctx.fillRect(60,overY+32,ofW,ofH);
    ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.fillText('🔥 OFERTA ESPECIAL',60+18,overY+32+ofH/2);
    // Preço original riscado
    ctx.font='300 42px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,0.55)';ctx.textBaseline='top';
    ctx.fillText(precoOrig,60,overY+106);
    var oldW2=ctx.measureText(precoOrig).width;
    ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(60,overY+106+22);ctx.lineTo(60+oldW2,overY+106+22);ctx.stroke();
    // Preço novo
    ctx.font='400 110px "DM Serif Display",serif';ctx.fillStyle='#fff';ctx.textBaseline='top';ctx.textAlign='left';
    ctx.fillText(precoVal,60,overY+160);
  } else {
    ctx.font='400 110px "DM Serif Display",serif';ctx.fillStyle='#fff';ctx.textBaseline='top';ctx.textAlign='left';
    ctx.fillText(precoVal,60,overY+38);
    if(isR){ctx.font='300 38px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fillText('/mês',60+ctx.measureText(precoVal).width+14,overY+100);}
  }

  // Borda foto/specs
  ctx.strokeStyle=BORDER;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,PHOTO_H);ctx.lineTo(W,PHOTO_H);ctx.stroke();

  // Specs bar (3 colunas)
  var specs=[];
  if(im.area)specs.push({val:im.area+'m²',lbl:'Privativos'});
  if(im.quartos){specs.push({val:im.quartos+' dorm',lbl:im.suites?im.suites+' suíte'+(im.suites>1?'s':''):'Dorm.'});}
  if(im.vagas)specs.push({val:im.vagas+' vaga'+(im.vagas>1?'s':''),lbl:'Garagem'});
  while(specs.length<3)specs.push({val:'—',lbl:''});
  specs=specs.slice(0,3);
  var colW=W/3;
  specs.forEach(function(sp,i){
    var cx=i*colW,cy=PHOTO_H;
    if(i>0){ctx.strokeStyle=BORDER;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,cy+22);ctx.lineTo(cx,cy+SPECS_H-22);ctx.stroke();}
    ctx.font='400 62px "DM Serif Display",serif';ctx.fillStyle=DARK;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(sp.val,cx+colW/2,cy+SPECS_H*0.42);
    ctx.font='300 28px DM Sans,sans-serif';ctx.fillStyle='#AAAAAA';ctx.textAlign='center';
    ctx.fillText((sp.lbl||'').toUpperCase(),cx+colW/2,cy+SPECS_H*0.76);
  });

  // Borda specs/footer
  ctx.strokeStyle=BORDER;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,PHOTO_H+SPECS_H);ctx.lineTo(W,PHOTO_H+SPECS_H);ctx.stroke();

  // Footer
  var fy=PHOTO_H+SPECS_H;
  var descTxt=(im.descri||tipo+' · NaPlanta Imóveis').replace(/\s+/g,' ').trim();
  ctx.font='300 28px DM Sans,sans-serif';ctx.fillStyle='#B0A89E';ctx.textAlign='left';ctx.textBaseline='top';
  wrap(ctx,descTxt,60,fy+30,W-120,46,4);
  return c;
}

function gerarVideo(){
  if(!imovelAtivo)return;
  var im=imovelAtivo,btn=document.getElementById('gen-video-btn');
  var fotos=im.fotos||[];
  if(!fotos.length){alert('Sem fotos para gerar video.');return;}

  btn.disabled=true;btn.innerHTML='<span class="spinner-inline"></span>Gerando video...';
  document.getElementById('modal-result').innerHTML='<div class="loading-msg"><span class="spinner-inline"></span>Carregando fotos para o video...<div class="progress-bar" style="margin-top:1rem"><div class="progress-fill" id="vid-progress" style="width:0%"></div></div></div>';

  var tipo=tipoLabel(im.tipo),isR=im.transac==='For Rent',preco=isR?fmtR(im.aluguel)+'/mes':fmtR(im.preco);
  var W=1080,H=1080;
  // Limita a 10 fotos para o video
  var fotoUrls=fotos.slice(0,10);
  var total=fotoUrls.length,loaded=0;

  var promises=fotoUrls.map(function(url){
    return loadImg(url).then(function(img){
      loaded++;
      var pct=Math.round((loaded/total)*60);
      var pf=document.getElementById('vid-progress');
      if(pf)pf.style.width=pct+'%';
      return img;
    });
  });
  promises.push(loadLogo());

  Promise.all(promises).then(function(results){
    var imgs=results.slice(0,-1).filter(Boolean);
    var logo=results[results.length-1];
    if(!imgs.length){btn.disabled=false;btn.textContent='\u25b6 Gerar Video Slideshow';document.getElementById('modal-result').innerHTML='<div class="loading-msg">Nenhuma foto carregou. Tente com menos fotos.</div>';return;}

    var pf=document.getElementById('vid-progress');if(pf)pf.style.width='70%';

    // Canvas para frames
    var canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    var ctx=canvas.getContext('2d');

    // Verifica suporte
    if(!window.MediaRecorder||!MediaRecorder.isTypeSupported('video/webm;codecs=vp8')){
      // Fallback: exporta GIF via frames em PNG
      btn.disabled=false;btn.textContent='\u25b6 Gerar Video Slideshow';
      document.getElementById('modal-result').innerHTML='<div class="loading-msg" style="color:#E60000">Seu navegador nao suporta gravacao de video. Use Chrome ou Edge para esta funcionalidade.</div>';
      return;
    }

    var stream=canvas.captureStream(25);
    var recorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp8',videoBitsPerSecond:2500000});
    var chunks=[];
    recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
    recorder.onstop=function(){
      var blob=new Blob(chunks,{type:'video/webm'});
      var url=URL.createObjectURL(blob);
      if(pf)pf.style.width='100%';
      buildLegenda(im,tipo,preco,isR).then(function(ld){
        renderResult(im,ld.legenda,ld.tags,ld.waLink,null,null,{url:url,blob:blob,id:im.id});
        btn.disabled=false;btn.textContent='\u25b6 Gerar Video novamente';
      });
    };

    recorder.start();
    var FPS=25,DURATION=3,TRANSITION=0.5; // 3s por foto, 0.5s transicao
    var frameTotal=Math.round((DURATION+TRANSITION)*FPS*imgs.length);
    var frame=0;

    function renderFrame(){
      if(frame>=frameTotal){recorder.stop();return;}
      var imgIdx=Math.floor(frame/((DURATION+TRANSITION)*FPS));
      imgIdx=Math.min(imgIdx,imgs.length-1);
      var timeInImg=(frame%((DURATION+TRANSITION)*FPS))/FPS;
      var alpha=1;
      if(timeInImg>DURATION)alpha=1-((timeInImg-DURATION)/TRANSITION); // fade out

      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#0D0D0D';ctx.fillRect(0,0,W,H);

      // Foto com efeito ken burns sutil
      var curImg=imgs[imgIdx];
      if(curImg){
        var progress=timeInImg/DURATION;
        var scale=Math.max(W/curImg.width,H/curImg.height)*(1+0.03*progress);
        var sw=curImg.width*scale,sh=curImg.height*scale;
        ctx.globalAlpha=alpha;
        ctx.drawImage(curImg,(W-sw)/2,(H-sh)/2,sw,sh);
        ctx.globalAlpha=1;
      }

      // Proximo frame blend
      if(timeInImg>DURATION&&imgIdx+1<imgs.length){
        var nextImg=imgs[imgIdx+1];
        var nextAlpha=(timeInImg-DURATION)/TRANSITION;
        if(nextImg){
          var s2=Math.max(W/nextImg.width,H/nextImg.height);
          ctx.globalAlpha=nextAlpha;
          ctx.drawImage(nextImg,(W-nextImg.width*s2)/2,(H-nextImg.height*s2)/2,nextImg.width*s2,nextImg.height*s2);
          ctx.globalAlpha=1;
        }
      }

      // Overlay mascara
      var gT=ctx.createLinearGradient(0,0,0,380);gT.addColorStop(0,'rgba(0,0,0,0.82)');gT.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gT;ctx.fillRect(0,0,W,380);
      var gB=ctx.createLinearGradient(0,600,0,H);gB.addColorStop(0,'rgba(0,0,0,0)');gB.addColorStop(0.5,'rgba(0,0,0,0.8)');gB.addColorStop(1,'rgba(0,0,0,0.88)');ctx.fillStyle=gB;ctx.fillRect(0,600,W,H-600);

      // Logo
      if(logo){ctx.drawImage(logo,50,36,Math.round(logo.width*(50/logo.height)),50);}
      // Badge
      var opTxt=im.transac==='For Rent'?'LOCA\u00c7\u00c3O':'VENDA';
      ctx.font='700 22px DM Sans,sans-serif';var oW=ctx.measureText(opTxt).width+32;
      ctx.fillStyle='#E60000';rr(ctx,W-oW-40,36,oW,44,6);ctx.fill();
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(opTxt,W-40-oW/2,58);ctx.textAlign='left';
      // Bairro
      ctx.fillStyle='rgba(255,255,255,0.72)';ctx.font='400 28px DM Sans,sans-serif';ctx.textBaseline='top';ctx.fillText('\uD83D\uDCCD '+(im.bairro||'')+', '+im.cidade,50,106);
      // Tipo
      ctx.textBaseline='alphabetic';ctx.fillStyle='#fff';ctx.font='900 62px DM Sans,sans-serif';ctx.fillText(tipo,50,800);
      ctx.fillStyle='#E60000';ctx.fillRect(50,810,90,5);
      // Specs
      var sp=specsList(im),px=50,py=830;ctx.font='500 26px DM Sans,sans-serif';ctx.textBaseline='top';
      sp.forEach(function(s){var tw=ctx.measureText(s).width,pw=tw+28,ph=40;ctx.fillStyle='rgba(255,255,255,0.12)';rr(ctx,px,py,pw,ph,6);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillText(s,px+14,py+8);px+=pw+10;});
      // Preco dir
      if(preco){ctx.font='700 44px DM Sans,sans-serif';var pw2=ctx.measureText(preco).width;ctx.fillStyle='rgba(0,0,0,0.55)';rr(ctx,W-pw2-98,H-98,pw2+36,66,8);ctx.fill();ctx.fillStyle='#E60000';ctx.fillRect(W-pw2-98,H-98,5,66);ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.fillText(preco,W-pw2-76,H-98+33);}
      // Counter
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='400 22px DM Sans,sans-serif';ctx.textAlign='right';ctx.textBaseline='alphabetic';ctx.fillText((imgIdx+1)+'/'+imgs.length,W-40,H-44);ctx.textAlign='left';
      // Rodape
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,1018,W,62);ctx.fillStyle='#E60000';ctx.fillRect(0,1018,5,62);ctx.fillStyle='rgba(255,255,255,0.38)';ctx.font='400 22px DM Sans,sans-serif';ctx.textBaseline='middle';ctx.fillText('@naplanta_imoveis  \u00b7  (48) 99153-1668',20,1038);
  ctx.font='700 20px DM Sans,sans-serif';var codT='COD. #'+im.id;var codW2=ctx.measureText(codT).width+20;ctx.fillStyle='#E60000';ctx.fillRect(W-codW2-20,1018,codW2,70);ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.textAlign='right';ctx.fillText(codT,W-28,1053);ctx.textAlign='left';

      frame++;
      requestAnimationFrame(renderFrame);
    }
    requestAnimationFrame(renderFrame);
    // Update progress
    var progInterval=setInterval(function(){
      var pct=70+Math.round((frame/frameTotal)*28);
      var pf2=document.getElementById('vid-progress');if(pf2)pf2.style.width=pct+'%';
      if(frame>=frameTotal)clearInterval(progInterval);
    },200);
  });
}

// ── BUILD LEGENDA COM WA ENCURTADO ────────────────────────────────────────────
function buildLegenda(im,tipo,preco,isR){
  // Encurta link do imovel via TinyURL (link limpo para legenda)
  var imovelUrl=linkImovel(im.id);
  return Promise.resolve().then(function(){
    var loc=(im.bairro||'')+(im.bairro&&im.cidade?', ':'')+im.cidade+'/SC';
    var l=[];
    // Codigo em destaque no inicio
    l.push('\uD83C\uDFE0 '+tipo.toUpperCase()+' '+(isR?'para LOCAR':'a VENDA')+' em '+(im.bairro||im.cidade)+'!');
    l.push('\uD83D\uDD17 COD. '+im.id);
    l.push('');
    if(im.descri){var pf=im.descri.replace(/\s+/g,' ').split(/[.!]/)[0];if(pf&&pf.length>20){l.push('\u2728 '+pf.trim()+'.');l.push('');}}
    if(im.quartos&&im.quartos!=='0')l.push('\uD83D\uDECF\uFE0F '+im.quartos+' dormit\u00f3rio'+(im.quartos>'1'?'s':'')+(im.suites&&im.suites!=='0'?' (sendo '+im.suites+' su\u00edte'+(im.suites>'1'?'s':'')+')'  :''));
    if(im.area&&im.area!=='0')l.push('\uD83D\uDCD0 '+im.area+'m\u00b2');
    if(im.banhos&&im.banhos!=='0')l.push('\uD83D\uDEC1 '+im.banhos+' banheiro'+(im.banhos>'1'?'s':''));
    if(im.vagas&&im.vagas!=='0')l.push('\uD83D\uDE97 '+im.vagas+' vaga'+(im.vagas>'1'?'s':'')+' de garagem');
    l.push('');l.push('\uD83D\uDCCD '+loc);if(preco)l.push('\uD83D\uDCB0 '+preco);
    l.push('');
    l.push('\uD83D\uDD17 Mais detalhes: '+imovelUrl);
    l.push('\uD83D\uDC47 Acesse o link na bio @naplanta_imoveis');
    l.push('\uD83D\uDCDE Fale conosco: (48) 99153-1668');
    var hb=slugify(im.bairro),hc=slugify(im.cidade);
    // Instagram permite poucos hashtags relevantes — 5 no maximo
    var tags=[slugify(tipo)+'avenda',hb,'naplanta',hc+'imoveis','imoveissc'];
    return{legenda:l.join('\n'),tags:tags,waLink:null};
  });
}

function renderResultMulti(im,legenda,hashtags,waLink,allFc,allSc){

function buildCaptionEl(im,legenda,hashtags,waLink){

// ── XML EXPORT ────────────────────────────────────────────────────────────────
async function gerarXMLExport(){
  if(!todosImoveis.length){alert('Carregue os imóveis primeiro.');return;}
  var btn=document.getElementById('export-xml-btn');
  var prog=document.getElementById('export-progress');
  btn.disabled=true;
  var total=todosImoveis.length,done=0;

  var pb=document.getElementById('xml-progress-bar');if(pb)pb.style.display='block';var pf=document.getElementById('xml-progress-fill');var prog=document.getElementById('footer-xml-status');var btn2=document.getElementById('footer-xml-btn');if(btn2)btn2.disabled=true;if(prog)prog.textContent='Gerando templates... 0/'+total;

  // Gera XML base fiel ao original, adicionando 3 imagens de template por imovel
  var xmlLines=[];
  xmlLines.push('<?xml version="1.0" encoding="UTF-8"?>');
  xmlLines.push('<ListingDataFeed xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">');
  xmlLines.push('  <Header>');
  xmlLines.push('    <Provider>NaPlanta Imobiliaria</Provider>');
  xmlLines.push('    <GeneratedDate>'+new Date().toISOString()+'</GeneratedDate>');
  xmlLines.push('    <TemplatesIncluded>true</TemplatesIncluded>');
  xmlLines.push('  </Header>');
  xmlLines.push('  <Listings>');

  var logo=await loadLogo();

  for(var i=0;i<todosImoveis.length;i++){
    var im=todosImoveis[i];
    done++;
    if(prog)prog.textContent='Gerando... '+done+'/'+total+' ('+im.bairro+')';if(pf)pf.style.width=Math.round(done/total*90)+'%';

    // Carrega primeira foto
    var fotoUrl=im.fotos&&im.fotos[0]?im.fotos[0]:null;
    var foto=fotoUrl?await loadImg(fotoUrl):null;

    var tipo=tipoLabel(im.tipo);
    var isR=im.transac==='For Rent';
    var preco=isR?fmtR(im.aluguel)+'/mes':fmtR(im.preco);

    // Gera 3 canvas: feed, story, feed com foto2 se disponivel
    var canvases=[];
    var feedC=drawFeed(im,tipo,foto,logo);
    canvases.push({canvas:feedC,label:'template_feed'});

    var storyC=drawStory(im,tipo,foto,logo);
    canvases.push({canvas:storyC,label:'template_story'});

    // Terceira: feed com segunda foto se existir, senão repete feed
    var foto2Url=im.fotos&&im.fotos[1]?im.fotos[1]:null;
    var foto2=foto2Url?await loadImg(foto2Url):foto;
    var feed2C=drawFeed(im,tipo,foto2,logo);
    canvases.push({canvas:feed2C,label:'template_feed2'});

    // Monta o Listing XML
    var xml='    <Listing>\n';
    xml+='      <ListingID>'+escXml(im.id)+'</ListingID>\n';
    xml+='      <Title>'+escXml(im.titulo)+'</Title>\n';
    xml+='      <TransactionType>'+escXml(im.transac)+'</TransactionType>\n';
    xml+='      <Details>\n';
    xml+='        <PropertyType>'+escXml(im.tipo)+'</PropertyType>\n';
    if(im.preco) xml+='        <ListPrice currency="BRL">'+im.preco+'</ListPrice>\n';
    if(im.aluguel) xml+='        <RentalPrice currency="BRL">'+im.aluguel+'</RentalPrice>\n';
    if(im.area)    xml+='        <ConstructedArea unit="m2">'+escXml(im.area)+'</ConstructedArea>\n';
    if(im.quartos) xml+='        <Bedrooms>'+escXml(im.quartos)+'</Bedrooms>\n';
    if(im.banhos)  xml+='        <Bathrooms>'+escXml(im.banhos)+'</Bathrooms>\n';
    if(im.suites)  xml+='        <Suites>'+escXml(im.suites)+'</Suites>\n';
    if(im.vagas)   xml+='        <Garage>'+escXml(im.vagas)+'</Garage>\n';
    if(im.descri)  xml+='        <Description><![CDATA['+im.descri+']]></Description>\n';
    xml+='      </Details>\n';
    xml+='      <Location>\n';
    if(im.bairro) xml+='        <Neighborhood>'+escXml(im.bairro)+'</Neighborhood>\n';
    if(im.cidade) xml+='        <City>'+escXml(im.cidade)+'</City>\n';
    if(im.estado) xml+='        <State>'+escXml(im.estado)+'</State>\n';
    xml+='      </Location>\n';
    if(im.condo)   xml+='      <Building>'+escXml(im.condo)+'</Building>\n';

    // Fotos originais
    xml+='      <Media>\n';
    (im.fotos||[]).forEach(function(url,fi){
      xml+='        <Item medium="image" order="'+(fi+1)+'">'+escXml(url)+'</Item>\n';
    });

    // 3 imagens de template em base64
    canvases.forEach(function(ct,ci){
      var dataUrl=ct.canvas.toDataURL('image/jpeg',0.88);
      xml+='        <Item medium="image" type="template" label="'+ct.label+'" order="'+(100+ci+1)+'">'+dataUrl+'</Item>\n';
    });

    xml+='      </Media>\n';
    xml+='    </Listing>';
    xmlLines.push(xml);
  }

  xmlLines.push('  </Listings>');
  xmlLines.push('</ListingDataFeed>');

  var xmlStr=xmlLines.join('\n');
  var blob=new Blob([xmlStr],{type:'application/xml;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='naplanta-feed-com-templates-'+new Date().toISOString().slice(0,10)+'.xml';
  a.click();

  if(pf)pf.style.width='100%';if(prog)prog.textContent='\u2713 XML gerado com sucesso! '+total+' im\u00f3veis com 3 templates cada.';if(btn2)btn2.disabled=false;
}

function escXml(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getUsuarios(){
  try{return JSON.parse(localStorage.getItem('np_usuarios')||'[]');}catch{return [];}
}
function saveUsuarios(list){
  localStorage.setItem('np_usuarios',JSON.stringify(list));
}
function isAdmin(email){
  return email==='felipe@naplanta.com';
}

// Atualiza USUARIOS em runtime com os cadastrados no localStorage
function carregarUsuariosRuntime(){
  var list=getUsuarios();
  list.forEach(function(u){
    if(!USUARIOS[u.email]) USUARIOS[u.email]=u.senha;
  });
}

function abrirCadastro(){
  document.getElementById('cadastro-modal').style.display='flex';
  renderListaUsuarios();
  ['cad-nome','cad-email','cad-senha','cad-senha2'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('cad-error').textContent='';
  document.getElementById('cad-success').textContent='';
}
function fecharCadastro(){
  document.getElementById('cadastro-modal').style.display='none';
}
document.getElementById('cadastro-modal').onclick=function(e){
  if(e.target===this)fecharCadastro();
};

function cadastrarUsuario(){
  var nome   = document.getElementById('cad-nome').value.trim();
  var email  = document.getElementById('cad-email').value.trim().toLowerCase();
  var senha  = document.getElementById('cad-senha').value;
  var senha2 = document.getElementById('cad-senha2').value;
  var perfil = document.getElementById('cad-perfil').value;
  var errEl  = document.getElementById('cad-error');
  var okEl   = document.getElementById('cad-success');
  errEl.textContent=''; okEl.textContent='';

  if(!nome)         {errEl.textContent='Informe o nome.';return;}
  if(!email||email.indexOf('@')<0){errEl.textContent='E-mail inválido.';return;}
  if(senha.length<6){errEl.textContent='Senha deve ter no mínimo 6 caracteres.';return;}
  if(senha!==senha2){errEl.textContent='As senhas não conferem.';return;}

  var list=getUsuarios();
  if(list.find(function(u){return u.email===email;})||USUARIOS[email]){
    errEl.textContent='E-mail já cadastrado.';return;
  }

  list.push({nome:nome,email:email,senha:senha,perfil:perfil,
    criado:new Date().toLocaleDateString('pt-BR')});
  saveUsuarios(list);
  USUARIOS[email]=senha;

  okEl.textContent='Usuário '+nome+' cadastrado com sucesso!';
  ['cad-nome','cad-email','cad-senha','cad-senha2'].forEach(function(id){
    document.getElementById(id).value='';
  });
  renderListaUsuarios();
}

function removerUsuario(email){
  if(email==='felipe@naplanta.com'){alert('O usuário admin não pode ser removido.');return;}
  if(!confirm('Remover usuário '+email+'?'))return;
  var list=getUsuarios().filter(function(u){return u.email!==email;});
  saveUsuarios(list);
  delete USUARIOS[email];
  renderListaUsuarios();
}

function renderListaUsuarios(){
  var list=getUsuarios();
  var el=document.getElementById('usuarios-lista');
  if(!el)return;
  if(!list.length){
    el.innerHTML='<p style="color:#444;font-size:.75rem;text-align:center;margin-top:.75rem">Nenhum usuário cadastrado ainda.</p>';
    return;
  }
  var html='<table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Criado</th><th></th></tr></thead><tbody>';
  list.forEach(function(u){
    html+='<tr><td>'+escXml(u.nome)+'</td><td>'+escXml(u.email)+'</td>'+
      '<td>'+escXml(u.perfil)+'</td><td>'+(u.criado||'—')+'</td>'+
      '<td><button class="del-usr" onclick="removerUsuario(\''+u.email+'\')">&#10005;</button></td></tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}
